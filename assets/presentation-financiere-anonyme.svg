<svg xmlns="http://www.w3.org/2000/svg" viewBox="400 0 1200 1200">
  <defs>
    <filter id="soft-face" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <clipPath id="faces">
      <circle cx="1015" cy="448" r="68"/>
      <circle cx="1243" cy="485" r="62"/>
    </clipPath>
    <linearGradient id="warm-overlay" x1="490" y1="120" x2="1490" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7df" stop-opacity=".18"/>
      <stop offset=".56" stop-color="#c99b35" stop-opacity=".08"/>
      <stop offset="1" stop-color="#201d18" stop-opacity=".2"/>
    </linearGradient>
  </defs>
  <image href="presentation-financiere.jpg" width="1800" height="1200"/>
  <image href="presentation-financiere.jpg" width="1800" height="1200" clip-path="url(#faces)" filter="url(#soft-face)"/>
  <rect x="400" width="1200" height="1200" fill="url(#warm-overlay)"/>
